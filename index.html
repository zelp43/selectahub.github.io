<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selecta Hub — DJ Tools & Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #2ecc40;
      --gold:   #ffc107;
      --black:  #0a0a0a;
      --card:   #161616;
      --border: #2a2a2a;
      --text:   #e8e8e8;
      --muted:  #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.4;
    }

    .glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%);
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(46,204,64,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      width: 140px; height: 140px; object-fit: contain;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 40px rgba(46,204,64,0.25));
      animation: fadeUp 0.6s ease both;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .brand span { color: var(--green); }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      margin: 12px 0 52px;
      letter-spacing: 1px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 620px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .product-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .product-card.green::before { background: linear-gradient(90deg, var(--green), var(--gold)); }
    .product-card.gold::before  { background: linear-gradient(90deg, var(--gold), var(--green)); }

    .product-card:hover { transform: translateY(-4px); }
    .product-card.green:hover { border-color: rgba(46,204,64,0.5); }
    .product-card.gold:hover  { border-color: rgba(255,193,7,0.5); }
    .product-card:hover::before { opacity: 1; }

    .product-icon {
      font-size: 2rem;
      margin-bottom: 4px;
    }

    .product-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      line-height: 1;
    }

    .product-card.green .product-name { color: #fff; }
    .product-card.gold  .product-name { color: var(--gold); }

    .product-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .product-badge {
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
    }

    .badge-live {
      background: rgba(46,204,64,0.1);
      border: 1px solid rgba(46,204,64,0.3);
      color: var(--green);
    }

    .badge-soon {
      background: rgba(255,193,7,0.1);
      border: 1px solid rgba(255,193,7,0.3);
      color: var(--gold);
    }

    .arrow {
      margin-left: auto;
      font-size: 1.2rem;
      color: var(--muted);
      transition: color 0.3s, transform 0.3s;
    }

    .product-card:hover .arrow { color: var(--text); transform: translateX(4px); }

    .footer-note {
      margin-top: 52px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .products { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="container">
    <img src="SH_TRANSPARENT_NEW.png" alt="Selecta Hub" class="logo"/>

    <h1 class="brand">SELECTA <span>HUB</span></h1>
    <p class="tagline">Tools built for serious DJs</p>

    <div class="products">

      <a href="selectatool.html" class="product-card green">
        <div class="product-icon">🎛️</div>
        <div class="product-name">Selecta Tool</div>
        <p class="product-desc">DJ crate management for Serato. Build, sort, export and clean your library.</p>
        <span class="product-badge badge-live">Live — $29.99</span>
        <span class="arrow">→</span>
      </a>

      <a href="selectacrates.html" class="product-card gold">
        <div class="product-icon">📦</div>
        <div class="product-name">Selecta Crates</div>
        <p class="product-desc">Premium DJ library packs — years of curated music, ready to drop.</p>
        <span class="product-badge badge-soon">Coming Soon</span>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="footer-note">© 2026 Selecta Hub. All rights reserved.</p>
  </div>
</body>
</html>
